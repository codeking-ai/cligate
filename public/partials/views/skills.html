<div class="skills-market-shell">
                    <div class="skills-market-header">
                        <div class="min-w-0">
                            <div class="skills-market-eyebrow" x-text="t('skillsWorkspaceEyebrow')"></div>
                            <h1 class="skills-market-title" x-text="t('skillsTitle')"></h1>
                            <p class="skills-market-desc" x-text="t('skillsOverviewDesc')"></p>
                        </div>
                        <div class="skills-market-actions">
                            <div class="skills-market-switch" :class="{ 'is-disabled': !skillsEnabled }">
                                <div>
                                    <div class="skills-market-switch-title" x-text="t('skillsSystemSwitch')"></div>
                                    <div class="skills-market-switch-desc" x-text="skillsEnabled ? t('skillsEnabledSummary') : t('skillsDisabledSummary')"></div>
                                </div>
                                <button class="skills-toggle" :class="{ 'is-on': skillsEnabled }" @click="toggleSkillsEnabled()" :aria-label="t('skillsSystemSwitch')">
                                    <span></span>
                                </button>
                            </div>
                            <button class="btn btn-sm btn-surface gap-1.5" @click="loadSkills({ forceReload: true })" :disabled="skillsLoading">
                                <svg class="w-3.5 h-3.5" :class="{'animate-spin': skillsLoading}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                                <span x-text="t('refresh')"></span>
                            </button>
                            <button class="btn btn-sm btn-accent-purple gap-1.5" @click="openSkillImportModal()">
                                <span>+</span>
                                <span x-text="t('skillsImport')"></span>
                            </button>
                        </div>
                    </div>

                    <template x-if="!selectedSkillSummary">
                        <div class="skills-browse-view">
                            <div class="skills-market-toolbar">
                                <div class="skills-filter-tabs">
                                    <template x-for="option in skillFilterOptions()" :key="option.key">
                                        <button class="skills-filter-tab"
                                            :class="{ 'is-active': skillsScopeFilter === option.key }"
                                            @click="skillsScopeFilter = option.key">
                                            <span class="skills-filter-dot" :style="`background: ${option.color}`"></span>
                                            <span x-text="option.label"></span>
                                        </button>
                                    </template>
                                </div>
                                <div class="skills-search-wrap">
                                    <svg class="skills-search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                    <input type="text" x-model="skillsSearchQuery" :placeholder="t('skillsSearchPlaceholder')" class="skills-search-input">
                                </div>
                            </div>

                            <div class="skills-market-stats">
                                <div class="skills-stat-pill">
                                    <span x-text="allSkills.length"></span>
                                    <small x-text="t('skillsCountLabel')"></small>
                                </div>
                                <div class="skills-stat-pill">
                                    <span x-text="installedSkills.length"></span>
                                    <small x-text="t('skillsInstalledCountLabel')"></small>
                                </div>
                                <div class="skills-stat-pill">
                                    <span x-text="skillsRoots.length"></span>
                                    <small x-text="t('skillsRootsLabel')"></small>
                                </div>
                            </div>

                            <div class="skills-masonry" x-show="filteredSkills.length > 0">
                                <template x-for="skill in filteredSkills" :key="skill.pathToSkillMd">
                                    <button class="skill-market-card" :class="skillCardTone(skill)" @click="loadSkillDetail(skill.pathToSkillMd)">
                                        <div class="skill-card-cover">
                                            <div class="skill-card-badge" x-text="skillScopeLabel(skill.scope)"></div>
                                            <div class="skill-card-icon" x-text="skillInitials(skill)"></div>
                                            <div class="skill-card-title" x-text="skill.name"></div>
                                            <div class="skill-card-subtitle" x-text="skillCardSubtitle(skill)"></div>
                                            <div class="skill-card-mini-grid">
                                                <template x-for="label in skillCardFeatureLabels(skill)" :key="label">
                                                    <span x-text="label"></span>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="skill-card-body">
                                            <div class="skill-card-name" x-text="skill.name"></div>
                                            <div class="skill-card-description" x-text="skill.shortDescription || skill.description"></div>
                                            <div class="skill-card-meta">
                                                <span :class="skillStatusBadgeClass(skill)" x-text="skillStatusLabel(skill)"></span>
                                                <span x-text="skillRelativeSource(skill)"></span>
                                            </div>
                                        </div>
                                    </button>
                                </template>
                            </div>

                            <div class="skills-empty-state" x-show="!skillsLoading && filteredSkills.length === 0">
                                <div class="skills-empty-mark">SK</div>
                                <div class="skills-empty-title" x-text="t('skillsInstalledEmpty')"></div>
                                <div class="skills-empty-copy" x-text="t('skillsOverviewDesc')"></div>
                            </div>
                        </div>
                    </template>

                    <template x-if="selectedSkillSummary">
                        <div class="skills-detail-view">
                            <div class="skills-detail-topbar">
                                <button class="skills-back-button" @click="clearSkillSelection()">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                                    </svg>
                                    <span x-text="t('back')"></span>
                                </button>
                                <div class="skills-detail-actions" x-show="skillCanManage(selectedSkillSummary)">
                                    <button class="btn btn-xs btn-outline text-gray-300"
                                        @click="setSkillEnabled(selectedSkillSummary, selectedSkillSummary?.enabled === false)"
                                        x-text="selectedSkillSummary?.enabled === false ? t('actionEnable') : t('actionDisable')"></button>
                                    <button class="btn btn-xs border border-red-500/30 bg-red-500/10 text-red-300"
                                        :disabled="skillDeletePending"
                                        @click="deleteSkill(selectedSkill)"
                                        x-text="t('delete')"></button>
                                </div>
                            </div>

                            <div class="skills-detail-grid">
                                <div class="skills-detail-cover-wrap">
                                    <div class="skills-detail-cover" :class="skillCardTone(selectedSkillSummary)">
                                        <div class="skill-card-cover">
                                            <div class="skill-card-badge" x-text="skillScopeLabel(selectedSkillSummary?.scope)"></div>
                                            <div class="skill-card-icon" x-text="skillInitials(selectedSkillSummary)"></div>
                                            <div class="skill-card-title" x-text="selectedSkillSummary?.name || '-'"></div>
                                            <div class="skill-card-subtitle" x-text="skillCardSubtitle(selectedSkillSummary)"></div>
                                            <div class="skill-card-mini-grid">
                                                <template x-for="label in skillCardFeatureLabels(selectedSkill || selectedSkillSummary)" :key="label">
                                                    <span x-text="label"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <aside class="skills-detail-panel">
                                    <div class="skills-detail-kicker">
                                        <span x-text="skillScopeLabel(selectedSkillSummary?.scope)"></span>
                                        <span>|</span>
                                        <span x-text="skillStatusLabel(selectedSkillSummary)"></span>
                                    </div>
                                    <h2 class="skills-detail-title" x-text="selectedSkillSummary?.name || '-'"></h2>
                                    <p class="skills-detail-description" x-text="selectedSkill?.description || selectedSkillSummary?.description || ''"></p>

                                    <div class="skills-detail-section">
                                        <div class="skills-detail-section-title" x-text="t('skillsWhenToUse')"></div>
                                        <div class="skills-detail-copy" x-text="selectedSkill?.whenToUse || t('notSet')"></div>
                                    </div>

                                    <div class="skills-detail-section">
                                        <div class="skills-detail-section-title" x-text="t('skillsPath')"></div>
                                        <div class="skills-detail-path" x-text="selectedSkillSummary?.pathToSkillMd || '-'"></div>
                                    </div>

                                    <div class="skills-detail-section">
                                        <div class="skills-detail-section-title" x-text="t('skillsTags')"></div>
                                        <div class="skills-detail-tags">
                                            <template x-for="tag in (selectedSkill?.tags || [])" :key="tag">
                                                <span x-text="tag"></span>
                                            </template>
                                            <div x-show="!(selectedSkill?.tags || []).length" class="skills-detail-muted" x-text="t('skillsNoTags')"></div>
                                        </div>
                                    </div>

                                    <div class="skills-detail-section" x-show="relatedSkills().length > 0">
                                        <div class="skills-detail-section-title" x-text="t('skillsRelatedTitle')"></div>
                                        <div class="skills-related-list">
                                            <template x-for="skill in relatedSkills()" :key="skill.pathToSkillMd">
                                                <button class="skills-related-card" @click="loadSkillDetail(skill.pathToSkillMd)">
                                                    <span class="skills-related-icon" x-text="skillInitials(skill)"></span>
                                                    <span class="skills-related-copy">
                                                        <strong x-text="skill.name"></strong>
                                                        <small x-text="skill.shortDescription || skill.description"></small>
                                                    </span>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                </aside>
                            </div>

                            <div class="skills-detail-raw">
                                <div class="skills-detail-section-title" x-text="t('skillsContent')"></div>
                                <span x-show="skillDetailLoading" class="skills-detail-muted" x-text="t('loading')"></span>
                                <pre class="custom-scrollbar" x-text="selectedSkill?.rawContent || ''"></pre>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="showSkillImportModal" x-transition class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" @click="closeSkillImportModal()"></div>
                    <div class="relative bg-space-900 border border-space-border rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden">
                        <div class="flex items-center justify-between gap-4 px-6 py-5 border-b border-space-border/30">
                            <div>
                                <h3 class="text-lg font-semibold text-white" x-text="t('skillsImportTitle')"></h3>
                                <p class="text-sm text-gray-500 mt-1" x-text="t('skillsImportDesc')"></p>
                            </div>
                            <button class="btn btn-sm btn-ghost btn-square" @click="closeSkillImportModal()">x</button>
                        </div>

                        <div class="p-6 space-y-5">
                            <div>
                                <label class="text-xs text-gray-500 mb-1.5 block" x-text="t('skillsImportModeLabel')"></label>
                                <div class="inline-flex rounded-xl border border-space-border/40 bg-space-900/50 p-1.5">
                                    <button class="btn btn-sm border-none rounded-lg"
                                        :class="skillsImportMode === 'directory' ? 'btn-accent-green' : 'btn-ghost text-gray-500'"
                                        @click="skillsImportMode = 'directory'"
                                        x-text="t('skillsImportModeDirectory')"></button>
                                    <button class="btn btn-sm border-none rounded-lg"
                                        :class="skillsImportMode === 'zip' ? 'btn-accent-purple' : 'btn-ghost text-gray-500'"
                                        @click="skillsImportMode = 'zip'"
                                        x-text="t('skillsImportModeZip')"></button>
                                </div>
                            </div>

                            <div x-show="skillsImportMode === 'directory'" class="space-y-3">
                                <div class="text-sm text-gray-400" x-text="t('skillsImportDirectoryHint')"></div>
                                <input id="skills-directory-input" type="file" webkitdirectory directory multiple class="hidden"
                                    @change="setSkillDirectorySelection($event.target.files)">
                                <button class="btn btn-sm btn-accent-green"
                                    @click="document.getElementById('skills-directory-input').click()"
                                    x-text="t('skillsChooseDirectory')"></button>
                                <div class="rounded-lg border border-space-border/40 bg-space-900/30 px-3 py-2"
                                    x-show="skillDirectoryName || skillDirectoryFiles.length > 0">
                                    <div class="text-xs font-mono text-white break-all" x-text="skillDirectoryName || t('skillsDirectoryPending')"></div>
                                    <div class="text-[11px] text-gray-500 mt-1" x-text="skillDirectoryFiles.length + ' ' + t('skillsFilesSelected')"></div>
                                </div>
                                <div class="text-xs text-gray-500 font-mono" x-text="t('skillsDirectoryFormatHint')"></div>
                            </div>

                            <div x-show="skillsImportMode === 'zip'" class="space-y-3">
                                <div class="text-sm text-gray-400" x-text="t('skillsImportZipHint')"></div>
                                <input type="file" accept=".zip,application/zip" @change="skillZipFile = $event.target.files[0] || null; skillZipName = skillZipFile?.name || ''"
                                    class="file-input file-input-bordered w-full bg-space-800 border-space-border text-white">
                                <div class="text-xs text-gray-500 font-mono" x-text="skillZipName || t('skillsNoZipSelected')"></div>
                            </div>
                        </div>

                        <div class="px-6 py-4 border-t border-space-border/30 flex items-center justify-end gap-2">
                            <button class="btn btn-sm btn-ghost" @click="closeSkillImportModal()" x-text="t('cancel')"></button>
                            <button class="btn btn-sm btn-accent-purple"
                                :disabled="skillImporting"
                                @click="submitSkillImport(skillsImportMode === 'directory' ? document.getElementById('skills-directory-input') : null)">
                                <span x-text="skillImporting ? t('saving') : t('skillsImportAction')"></span>
                            </button>
                        </div>
                    </div>
                </div>
