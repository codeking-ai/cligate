<div class="chat-layout flex flex-1 min-h-0 gap-6 items-stretch overflow-hidden"
     x-init="$nextTick(() => $refs.chatComposerInput?.focus())">
                    <div class="view-card chat-main-panel flex-1 flex flex-col h-full min-h-0 min-w-0 overflow-hidden">
                        <div class="chat-header flex items-start justify-between gap-4 mb-5 flex-shrink-0">
                            <div class="chat-header-copy">
                                <div class="chat-header-eyebrow text-[11px] font-mono uppercase tracking-[0.18em] text-gray-500">Workspace</div>
                                <h1 class="text-2xl font-bold text-white tracking-tight mt-2" x-text="t('chat')"></h1>
                                <p class="chat-header-subtitle text-sm text-gray-400 mt-1" x-text="t('chatDesc')"></p>
                            </div>
                            <div class="chat-header-actions flex items-center gap-2">
                                <div class="chat-side-tabs flex items-center gap-1 p-1 rounded-lg bg-space-900/60 border border-space-border/30">
                                    <button class="chat-side-tab px-3 py-1.5 rounded-md text-[11px] font-mono transition-all"
                                        :class="chatMode !== 'direct-chat' ? 'chat-side-tab-active text-white' : 'text-gray-500 hover:text-white'"
                                        @click="switchChatMode('assistant')"
                                        x-text="t('chatModeAgent')"></button>
                                    <button class="chat-side-tab px-3 py-1.5 rounded-md text-[11px] font-mono transition-all"
                                        :class="chatMode === 'direct-chat' ? 'chat-side-tab-active text-white' : 'text-gray-500 hover:text-white'"
                                        @click="switchChatMode('direct-chat')"
                                        x-text="t('chatModeAssistant')"></button>
                                </div>
                                <button class="chat-header-button btn btn-sm btn-surface"
                                    @click="toggleChatHistory()">
                                    <span x-text="t('chatHistory')"></span>
                                </button>
                                <button class="chat-header-button chat-header-button-primary btn btn-sm btn-accent-cyan"
                                    @click="newChatSession()" x-text="t('newChat')"></button>
                            </div>
                        </div>

                        <div x-show="chatMode !== 'direct-chat'" class="chat-agent-hint chat-control-panel rounded-2xl border border-space-border/30 bg-space-900/40 mb-4 flex-shrink-0 flex items-center justify-between gap-4">
                            <div class="text-sm text-gray-400" x-text="t('chatAgentHint')"></div>
                            <div class="flex items-center gap-2">
                                <button class="chat-control-button btn btn-sm btn-surface whitespace-nowrap" @click="setActiveTab('assistantAgent')">
                                    <span x-text="t('chatAgentConfigLink')"></span>
                                </button>
                            </div>
                        </div>

                        <div x-show="chatMode === 'direct-chat'" class="chat-control-panel rounded-2xl border border-space-border/30 bg-space-900/40 p-3 mb-4 flex-shrink-0">
                            <div class="chat-control-grid flex flex-wrap items-end gap-3">
                                <div class="chat-control-field min-w-0 chat-control-fixed" style="flex:0 0 200px;">
                                    <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('chatSource')"></label>
                                    <select x-model="chatSourceId" @change="ensureChatModelMatchesSource(); syncActiveChatSession()"
                                        class="chat-control-input input mt-1.5 h-10 bg-space-800 border-space-border text-white font-mono text-xs">
                                        <template x-for="source in chatSources" :key="source.id">
                                            <option :value="source.id" x-text="source.label"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="chat-control-field min-w-0 chat-control-flex" style="flex:1 1 auto;">
                                    <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('chatModel')"></label>
                                    <input type="text" list="chat-model-options" x-model="chatModel" @change="syncActiveChatSession()"
                                        class="chat-control-input input mt-1.5 h-10 bg-space-800 border-space-border text-white font-mono text-xs"
                                        :placeholder="t('chatModelPlaceholder')">
                                    <datalist id="chat-model-options">
                                        <template x-for="model in chatModelOptions()" :key="model">
                                            <option :value="model"></option>
                                        </template>
                                    </datalist>
                                </div>
                                <button class="chat-control-button btn btn-sm btn-surface mb-[1px] whitespace-nowrap"
                                    style="flex:0 0 auto;"
                                    @click="toggleSystemPrompt()">
                                    <span x-text="chatSystemPromptOpen ? t('hidePrompt') : t('showPrompt')"></span>
                                </button>
                            </div>

                            <div class="chat-control-helper mt-2 text-[11px] text-gray-500" x-show="chatSourceLoading" x-text="t('loadingChatSources')"></div>

                            <div x-show="chatSystemPromptOpen" x-transition class="chat-system-prompt mt-3 pt-3 border-t border-space-border/20">
                                <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('systemPromptOptional')"></label>
                                <textarea x-model="chatSystemPrompt" @input.debounce.300ms="syncActiveChatSession()" rows="3"
                                    class="chat-control-input input mt-1.5 bg-space-800 border-space-border text-white font-mono text-xs resize-y"
                                    :placeholder="t('systemPromptPlaceholder')"></textarea>
                            </div>
                        </div>

                        <div class="chat-status-bar flex items-center justify-between gap-4 mb-4 flex-shrink-0">
                            <div class="chat-status-copy text-sm text-gray-400 min-w-0">
                                <template x-if="chatMode === 'direct-chat'">
                                    <div class="chat-status-group flex items-center gap-2 flex-wrap">
                                        <span class="chat-status-label" x-text="t('chatUsing')"></span>
                                        <span class="chat-status-pill text-white font-mono truncate inline-block max-w-[340px] align-bottom" x-text="chatSourceLabel(chatSourceId)"></span>
                                        <template x-if="chatSourceHealthStats(chatSourceId)">
                                            <span class="chat-status-health-chip px-2 py-0.5 rounded-full border text-[10px] font-mono inline-flex items-center gap-1"
                                                :class="chatSourceHealthClass(chatSourceId)">
                                                <span x-text="'● ' + chatSourceHealthStats(chatSourceId).successRate + '%'"></span>
                                                <span class="opacity-70"
                                                    x-text="chatSourceHealthStats(chatSourceId).successes + '/' + chatSourceHealthStats(chatSourceId).total"></span>
                                                <span class="opacity-70" x-show="chatSourceHealthStats(chatSourceId).p50">·</span>
                                                <span class="opacity-70" x-show="chatSourceHealthStats(chatSourceId).p50"
                                                    x-text="'p50 ' + chatSourceHealthStats(chatSourceId).p50 + 'ms'"></span>
                                            </span>
                                        </template>
                                        <template x-if="!chatSourceHealthStats(chatSourceId)">
                                            <span class="chat-status-health-chip px-2 py-0.5 rounded-full border text-[10px] font-mono text-gray-500 border-space-border/40 bg-space-800/60"
                                                x-text="'● ' + t('chatHealthNoData')"></span>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="chatMode !== 'direct-chat'">
                                    <div class="chat-status-group flex items-center gap-2 flex-wrap">
                                        <template x-if="!getActiveChatSession()?.originChannel">
                                            <span class="chat-status-pill chat-status-pill-secondary text-[10px] font-mono text-gray-300" x-text="t('chatAgentStatusLabel')"></span>
                                        </template>
                                        <template x-if="getActiveChatSession()?.originChannel">
                                            <span class="chat-history-channel-badge px-2 py-0.5 rounded-full border text-[10px] font-mono inline-flex items-center gap-1.5"
                                                :class="chatHistoryChannelBadgeClass(getActiveChatSession()?.originChannel)">
                                                <span x-text="t('chatContinuationLabel')"></span>
                                                <span x-text="chatHistoryChannelLabel(getActiveChatSession()?.originChannel)"></span>
                                            </span>
                                        </template>
                                        <button class="chat-status-button btn btn-xs btn-surface"
                                            x-show="getActiveChatSession()?.originConversationId"
                                            @click="refreshActiveRemoteConversation()" x-text="t('chatContinuationRefresh')"></button>
                                        <template x-if="getActiveChatSession()?.runtimeSessionId">
                                            <span class="chat-status-pill chat-status-pill-muted text-[10px] font-mono text-gray-300"
                                                x-text="agentRuntimeStatusLabel()"></span>
                                        </template>
                                        <template x-if="getActiveChatSession()?.runtimeSessionId">
                                            <span class="chat-status-pill chat-status-pill-secondary text-[10px] font-mono text-gray-400"
                                                x-text="activeRuntimeSessionBadge()"></span>
                                        </template>
                                        <button class="chat-status-button btn btn-xs btn-surface"
                                            x-show="getActiveChatSession()?.runtimeSessionId"
                                            @click="startFreshAgentRuntimeSession()" x-text="t('agentRuntimeNewSession')"></button>
                                        <button class="chat-status-button chat-status-button-muted btn btn-xs btn-surface"
                                            x-show="getActiveChatSession()?.runtimeSessionId"
                                            @click="detachAgentRuntimeSession()" x-text="t('agentRuntimeDetach')"></button>
                                    </div>
                                </template>
                            </div>
                            <div class="chat-status-count text-xs font-mono text-gray-500" x-text="chatMessages.length + ' ' + t('messagesLower')"></div>
                        </div>

                        <div x-show="chatMode !== 'direct-chat'" class="mb-4 grid grid-cols-1 xl:grid-cols-[minmax(0,1.4fr)_minmax(0,1fr)] gap-4 flex-shrink-0">
                            <div class="rounded-2xl border border-space-border/30 bg-space-900/35 p-4">
                                <div class="flex items-center justify-between gap-3 mb-3">
                                    <div class="text-[11px] font-mono uppercase tracking-widest text-gray-500" x-text="t('assistantWorkbenchRelevantArtifacts')"></div>
                                    <span class="text-[10px] font-mono text-gray-500" x-text="assistantMind.relevantArtifacts.length"></span>
                                </div>
                                <div class="space-y-3" x-show="assistantMind.relevantArtifacts.length > 0">
                                    <template x-for="artifact in assistantMind.relevantArtifacts" :key="artifact.id">
                                        <div class="rounded-xl border border-space-border/20 bg-space-950/40 p-3">
                                            <div class="flex items-start justify-between gap-3">
                                                <div class="min-w-0">
                                                    <div class="text-sm text-white truncate" x-text="artifact.title || artifact.kind || artifact.id"></div>
                                                    <div class="mt-1 text-[10px] font-mono text-gray-500" x-text="[artifact.kind, artifact.role, artifact.source].filter(Boolean).join(' · ') || '-'"></div>
                                                </div>
                                                <span class="text-[10px] font-mono text-gray-500 shrink-0" x-text="formatRelativeTime(artifact.updatedAt)"></span>
                                            </div>
                                            <div class="mt-2 text-xs text-gray-300 whitespace-pre-wrap break-words" x-text="assistantMindArtifactPreview(artifact)"></div>
                                        </div>
                                    </template>
                                </div>
                                <div class="text-xs font-mono text-gray-500" x-show="assistantMind.relevantArtifacts.length === 0" x-text="t('assistantWorkbenchRelevantArtifactsEmpty')"></div>
                            </div>

                            <div class="rounded-2xl border border-space-border/30 bg-space-900/35 p-4">
                                <div class="flex items-center justify-between gap-3 mb-3">
                                    <div class="text-[11px] font-mono uppercase tracking-widest text-gray-500" x-text="t('assistantWorkbenchRecentChatTurns')"></div>
                                    <span class="text-[10px] font-mono text-gray-500" x-text="assistantMind.recentChatTurns.length"></span>
                                </div>
                                <div class="space-y-3" x-show="assistantMind.recentChatTurns.length > 0">
                                    <template x-for="turn in assistantMind.recentChatTurns" :key="turn.createdAt + ':' + turn.role + ':' + turn.text">
                                        <div class="rounded-xl border border-space-border/20 bg-space-950/40 p-3">
                                            <div class="flex items-center justify-between gap-3">
                                                <span class="text-[10px] font-mono uppercase tracking-widest"
                                                    :class="turn.role === 'user' ? 'text-neon-cyan' : 'text-gray-400'"
                                                    x-text="turn.role"></span>
                                                <span class="text-[10px] font-mono text-gray-500" x-text="formatRelativeTime(turn.createdAt)"></span>
                                            </div>
                                            <div class="mt-2 text-xs text-gray-200 whitespace-pre-wrap break-words" x-text="assistantMindRecentTurnPreview(turn)"></div>
                                        </div>
                                    </template>
                                </div>
                                <div class="text-xs font-mono text-gray-500" x-show="assistantMind.recentChatTurns.length === 0" x-text="t('assistantWorkbenchRecentChatTurnsEmpty')"></div>
                            </div>
                        </div>

                        <div x-ref="chatMessagesContainer" class="chat-message-stage flex-1 min-h-0 overflow-y-auto custom-scrollbar rounded-2xl border border-space-border/30 bg-space-950/40 p-4 space-y-4">
                            <template x-if="chatMessages.length === 0">
                                <div class="chat-empty-state h-full min-h-[320px] flex items-center justify-center text-center text-gray-500">
                                    <div class="chat-empty-card">
                                        <div class="chat-empty-title text-sm" x-text="t('chatEmptyTitle')"></div>
                                        <div class="chat-empty-desc text-xs mt-2 font-mono" x-text="t('chatEmptyDesc')"></div>
                                    </div>
                                </div>
                            </template>

                            <template x-for="(message, index) in chatMessages" :key="index">
                                <div class="flex chat-message-row" :class="(message.role === 'user' || message.kind === 'agent-input') ? 'justify-end' : 'justify-start'">
                                    <div class="chat-message-bubble max-w-[90%] rounded-2xl px-4 py-3 border"
                                        :class="[
                                            message.role === 'user'
                                                ? 'text-white'
                                                : (message.isError ? 'bg-red-500/10 border-red-500/30 text-red-200' : 'text-gray-100'),
                                            message.kind === 'agent-input' ? 'chat-message-bubble-dispatch' : ''
                                        ]">
                                        <div class="chat-message-meta flex items-center gap-2 mb-2 flex-wrap">
                                            <span class="text-[10px] font-mono uppercase tracking-wider"
                                                :class="message.role === 'user' ? 'text-neon-cyan' : (message.isError ? 'text-red-300' : 'text-gray-400')"
                                                x-text="message.role === 'user' ? t('you') : t('assistant')"></span>
                                            <span x-show="message._origin === 'remote'"
                                                class="chat-message-origin-badge px-1.5 py-0.5 rounded-full border text-[10px] font-mono"
                                                :class="chatHistoryChannelBadgeClass(message._originChannel || activeSessionOriginChannel())"
                                                x-text="chatHistoryChannelLabel(message._originChannel || activeSessionOriginChannel())"></span>
                                            <template x-if="message.isError && message.errorDetail">
                                                <span class="px-1.5 py-0.5 rounded-full border text-[10px] font-mono text-red-200 border-red-500/40 bg-red-500/15"
                                                    x-text="message.errorDetail.status || 'ERR'"></span>
                                            </template>
                                            <template x-if="message.isError && message.errorDetail">
                                                <span class="text-[10px] font-mono uppercase tracking-wider text-red-300"
                                                    x-text="t('chatErrorCategory_' + message.errorDetail.category)"></span>
                                            </template>
                                            <span class="text-[10px] font-mono text-gray-500" x-show="message.mappedModel" x-text="message.mappedModel"></span>
                                            <span class="text-[10px] font-mono text-violet-300" x-show="message.kind === 'agent-input'" x-text="t('agentRuntimeDispatch')"></span>
                                            <span class="text-[10px] font-mono text-violet-300" x-show="message.kind === 'agent-trace'" x-text="t('assistantTraceTitle')"></span>
                                            <span class="text-[10px] font-mono text-gray-500" x-show="message.kind === 'agent-command'" x-text="t('agentRuntimeCommand')"></span>
                                            <span class="text-[10px] font-mono text-gray-500" x-show="message.kind === 'agent-file-change'" x-text="t('agentRuntimeFilesChanged')"></span>
                                        </div>
                                        <pre class="chat-message-body whitespace-pre-wrap break-words text-sm font-sans" x-text="message.content"></pre>
                                        <div class="chat-error-detail mt-3 rounded-xl border border-red-500/30 bg-red-500/5 p-3"
                                            x-show="message.isError && message.errorDetail">
                                            <div class="text-[11px] font-mono text-red-300/80 break-all whitespace-pre-wrap"
                                                x-show="message.errorDetail?.raw && message.errorDetail.raw !== message.content"
                                                x-text="message.errorDetail?.raw"></div>
                                            <div class="mt-2 flex items-center gap-2" x-show="message.errorDetail?.jumpTo">
                                                <button class="btn btn-xs btn-surface"
                                                    @click="setActiveTab(message.errorDetail.jumpTo.tab)"
                                                    x-text="message.errorDetail?.jumpTo?.label"></button>
                                            </div>
                                        </div>
                                        <div class="chat-message-detail chat-command-output mt-3 rounded-xl border border-space-border/30 bg-space-950/50 p-3" x-show="message.kind === 'agent-command' && message.commandOutput">
                                            <button type="button"
                                                class="chat-command-output-toggle w-full flex items-center justify-between gap-2 text-left"
                                                @click="message.commandOutputCollapsed = !message.commandOutputCollapsed">
                                                <span class="text-[10px] font-mono uppercase tracking-wider text-gray-500" x-text="t('agentRuntimeCommandOutput')"></span>
                                                <span class="chat-command-output-chevron text-[11px] font-mono text-gray-400"
                                                    :title="message.commandOutputCollapsed ? t('agentRuntimeCommandOutputExpand') : t('agentRuntimeCommandOutputCollapse')"
                                                    x-text="message.commandOutputCollapsed ? '▶' : '▼'"></span>
                                            </button>
                                            <pre class="chat-command-output-body whitespace-pre-wrap break-words text-xs font-mono text-gray-300 mt-2"
                                                x-show="!message.commandOutputCollapsed"
                                                x-text="message.commandOutput"></pre>
                                        </div>
                                        <div class="chat-message-detail mt-3 rounded-xl border border-space-border/30 bg-space-950/50 p-3"
                                            x-show="chatMessageTraceId(message)">
                                            <button type="button"
                                                class="w-full flex items-center justify-between gap-3 text-left"
                                                @click="toggleAssistantRunTrace(chatMessageTraceId(message))">
                                                <div class="min-w-0">
                                                    <div class="text-[10px] font-mono uppercase tracking-wider text-gray-500" x-text="t('assistantTraceTitle')"></div>
                                                    <div class="mt-1 text-xs text-gray-300 truncate" x-text="assistantRunTraceStatus(chatMessageTraceId(message))"></div>
                                                </div>
                                                <div class="flex items-center gap-2 shrink-0">
                                                    <span class="text-[10px] font-mono text-gray-500"
                                                        x-text="assistantRunTraceEvents(chatMessageTraceId(message)).length + ' ' + t('assistantTraceSteps')"></span>
                                                    <span class="text-[11px] font-mono text-gray-400"
                                                        x-text="isAssistantRunTraceOpen(chatMessageTraceId(message)) ? '▼' : '▶'"></span>
                                                </div>
                                            </button>
                                            <div class="mt-3 space-y-2" x-show="isAssistantRunTraceOpen(chatMessageTraceId(message))" x-transition>
                                                <template x-if="assistantRunTraceEvents(chatMessageTraceId(message)).length === 0">
                                                    <div class="text-xs font-mono text-gray-500" x-text="t('assistantTraceEmpty')"></div>
                                                </template>
                                                <template x-for="event in assistantRunTracePreview(chatMessageTraceId(message))" :key="event.runId + ':' + event.seq">
                                                    <div class="rounded-lg border px-3 py-2"
                                                        :class="assistantRunTraceEventClass(event)">
                                                        <div class="flex items-start justify-between gap-3">
                                                            <div class="min-w-0">
                                                                <div class="text-xs text-gray-100 truncate" x-text="assistantRunTraceEventTitle(event)"></div>
                                                                <div class="mt-1 text-[10px] font-mono text-gray-500 truncate"
                                                                    x-text="[event.phase, event.status, event.type].filter(Boolean).join(' · ')"></div>
                                                            </div>
                                                            <span class="text-[10px] font-mono text-gray-500 shrink-0" x-text="formatRelativeTime(event.ts)"></span>
                                                        </div>
                                                        <div class="mt-2 text-xs text-gray-300 whitespace-pre-wrap break-words"
                                                            x-show="assistantRunTraceEventSummary(event)"
                                                            x-text="assistantRunTraceEventSummary(event)"></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="chat-message-callout chat-message-callout-question mt-3 rounded-xl border border-cyan-500/30 bg-cyan-500/10 p-3" x-show="message.kind === 'agent-question'">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-cyan-300 mb-2" x-text="t('agentRuntimeQuestion')"></div>
                                            <div class="text-xs text-cyan-100/80" x-show="message.questionStatus === 'pending'" x-text="t('agentRuntimeQuestionHint')"></div>
                                            <div class="text-xs text-gray-400" x-show="message.questionStatus !== 'pending'" x-text="t('agentRuntimeQuestionAnswered')"></div>
                                        </div>
                                        <div class="chat-message-callout chat-message-callout-approval mt-3 rounded-xl border border-amber-500/30 bg-amber-500/10 p-3" x-show="message.kind === 'agent-approval'">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-amber-300 mb-2" x-text="t('agentRuntimeApproval')"></div>
                                            <div class="text-xs text-amber-100/80 mt-2" x-text="message.approvalSummary || ''"></div>
                                            <div class="mt-3 flex items-center gap-2" x-show="message.approvalStatus === 'pending'">
                                                <button class="btn btn-sm btn-confirm"
                                                    @click="respondAgentRuntimeApproval(message, 'approve')" :disabled="message._approving === true">
                                                    <span x-text="message._approving ? t('sending') : t('confirmAction')"></span>
                                                </button>
                                                <button class="btn btn-sm btn-surface"
                                                    @click="respondAgentRuntimeApproval(message, 'deny')" :disabled="message._approving === true"
                                                    x-text="t('cancel')"></button>
                                            </div>
                                            <div class="mt-3 text-xs text-gray-300" x-show="message.approvalStatus !== 'pending'" x-text="message.approvalStatus"></div>
                                        </div>
                                        <div class="chat-message-citations mt-3" x-show="Array.isArray(message.citations) && message.citations.length > 0">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-gray-500 mb-2" x-text="t('chatManualSources')"></div>
                                            <div class="flex flex-wrap gap-2">
                                                <template x-for="citation in message.citations" :key="citation.id || citation.title">
                                                    <span class="chat-message-citation px-2 py-1 rounded-full bg-space-900/90 border border-space-border/40 text-[10px] font-mono text-gray-300"
                                                        x-text="formatChatCitation(citation)"></span>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="chat-message-attachments mt-3 flex flex-wrap gap-2"
                                            x-show="Array.isArray(message.attachments) && message.attachments.length > 0">
                                            <template x-for="attachment in message.attachments" :key="attachment.previewUrl || attachment.path || attachment.name">
                                                <div>
                                                    <!-- Image attachment → thumbnail. -->
                                                    <template x-if="attachment.kind === 'image' || attachment.previewUrl">
                                                        <div class="rounded-xl border border-space-border/40 bg-space-900/70 p-2">
                                                            <img class="block h-24 w-auto max-w-[180px] rounded-lg object-cover"
                                                                :src="attachment.previewUrl"
                                                                :alt="attachment.name || 'attachment'">
                                                            <div class="mt-2 text-[10px] font-mono text-gray-400 truncate max-w-[180px]" x-text="attachment.name || attachment.mediaType || 'image'"></div>
                                                        </div>
                                                    </template>
                                                    <!-- Document attachment → file chip, NOT an <img> (avoids the broken-image placeholder). -->
                                                    <template x-if="attachment.kind !== 'image' && !attachment.previewUrl">
                                                        <div class="flex items-center gap-2 rounded-xl border border-space-border/40 bg-space-900/70 px-3 py-2 max-w-[240px]">
                                                            <div class="h-9 w-9 shrink-0 rounded-lg border border-space-border/30 bg-space-950/70 flex items-center justify-center text-[9px] font-mono text-gray-400">DOC</div>
                                                            <div class="min-w-0">
                                                                <div class="text-xs font-mono text-gray-200 truncate" x-text="attachment.name || 'document'"></div>
                                                                <div class="text-[10px] font-mono text-gray-500 truncate"
                                                                    x-text="[attachment.mediaType || 'file', attachmentSizeLabel(attachment.size)].filter(Boolean).join(' · ')"></div>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                        <div class="chat-message-callout chat-message-callout-approval mt-3 rounded-xl border border-amber-500/30 bg-amber-500/10 p-3" x-show="message.pendingAction">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-amber-300 mb-2" x-text="t('assistantPendingAction')"></div>
                                            <div class="chat-message-callout-title text-sm text-white" x-text="message.pendingAction?.title || ''"></div>
                                            <div class="text-xs text-amber-100/80 mt-2" x-text="message.pendingAction?.summary || ''"></div>
                                            <div class="mt-3 flex items-center gap-2">
                                                <button class="btn btn-sm btn-confirm"
                                                    @click="confirmChatPendingAction(message)" :disabled="message._confirming === true">
                                                    <span x-text="message._confirming ? t('sending') : t('confirmAction')"></span>
                                                </button>
                                                <button class="btn btn-sm btn-surface"
                                                    @click="dismissChatPendingAction(message)" x-text="t('cancel')"></button>
                                            </div>
                                        </div>
                                        <div class="mt-3 text-[10px] font-mono text-gray-500" x-show="message.usage">
                                            <span x-text="'in ' + (message.usage?.prompt_tokens || 0)"></span>
                                            <span class="mx-2">&middot;</span>
                                            <span x-text="'out ' + (message.usage?.completion_tokens || 0)"></span>
                                            <span class="mx-2">&middot;</span>
                                            <span x-text="'total ' + (message.usage?.total_tokens || 0)"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="chat-composer mt-4 space-y-3 flex-shrink-0">
                            <div x-show="chatMode === 'assistant' && chatPendingImage"
                                class="flex items-center justify-between gap-3 rounded-xl border border-space-border/30 bg-space-900/60 px-3 py-2">
                                <div class="flex items-center gap-3 min-w-0">
                                    <img class="h-12 w-12 rounded-lg object-cover border border-space-border/30"
                                        :src="chatPendingImage?.previewUrl || chatPendingImage?.imageUrl"
                                        alt="pending image">
                                    <div class="min-w-0">
                                        <div class="text-xs font-mono text-gray-200 truncate" x-text="chatPendingImage?.name || 'image'"></div>
                                        <div class="text-[10px] font-mono text-gray-500 truncate"
                                            x-text="chatPendingImage?.mediaType || ''"></div>
                                    </div>
                                </div>
                                <button class="btn btn-xs btn-surface shrink-0"
                                    @click="clearAssistantPendingImage()" x-text="t('cancel')"></button>
                            </div>
                            <div x-show="chatMode === 'assistant' && chatPendingFile"
                                class="flex items-center justify-between gap-3 rounded-xl border border-space-border/30 bg-space-900/60 px-3 py-2">
                                <div class="flex items-center gap-3 min-w-0">
                                    <div class="h-12 w-12 rounded-lg border border-space-border/30 bg-space-950/70 flex items-center justify-center text-[11px] font-mono text-gray-400 shrink-0">FILE</div>
                                    <div class="min-w-0">
                                        <div class="text-xs font-mono text-gray-200 truncate" x-text="chatPendingFile?.name || 'document'"></div>
                                        <div class="text-[10px] font-mono text-gray-500 truncate"
                                            x-text="[chatPendingFile?.mediaType || '', chatPendingFile?.size ? (chatPendingFile.size + ' B') : ''].filter(Boolean).join(' · ')"></div>
                                    </div>
                                </div>
                                <button class="btn btn-xs btn-surface shrink-0"
                                    @click="clearAssistantPendingFile()" x-text="t('cancel')"></button>
                            </div>
                            <textarea x-ref="chatComposerInput" x-model="chatInput" rows="4"
                                class="chat-composer-input input bg-space-800 border-space-border text-white font-sans text-sm resize-y"
                                :placeholder="chatMode !== 'direct-chat' ? t('agentRuntimeInputPlaceholder') : t('chatInputPlaceholder')"
                                @keydown.ctrl.enter.prevent="sendChatMessage()"
                                @keydown.meta.enter.prevent="sendChatMessage()"></textarea>
                            <div class="chat-composer-footer flex items-center justify-between gap-4">
                                <div class="flex items-center gap-3 min-w-0">
                                    <div class="chat-composer-hint text-xs text-gray-500" x-text="chatMode !== 'direct-chat' ? t('agentRuntimeShortcutHint') : t('chatShortcutHint')"></div>
                                    <template x-if="chatMode === 'assistant'">
                                        <div class="shrink-0">
                                            <!-- One entry for both images and documents; handleAssistantAttachmentPicked
                                                 branches by file type (image → vision/base64, document → upload/read_document). -->
                                            <input type="file"
                                                accept="image/*,.txt,.md,.markdown,.csv,.tsv,.json,.jsonl,.log,.xml,.yaml,.yml,.ini,.conf,.html,.htm,.pdf,.docx,.pptx,.xlsx,text/*,application/pdf,application/json,application/xml,text/html,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                                                class="hidden" x-ref="assistantAttachmentInput"
                                                @change="handleAssistantAttachmentPicked($event)">
                                            <button type="button" class="btn btn-xs btn-surface"
                                                @click="$refs.assistantAttachmentInput?.click()"
                                                :title="t('attachHint')"
                                                x-text="t('attachLabel')"></button>
                                            <!-- Voice input: click to record, click again to stop + transcribe
                                                 (server account-pool first, in-browser Whisper fallback). -->
                                            <button type="button" class="btn btn-xs btn-surface"
                                                :class="chatRecording ? 'text-red-300 border-red-500/40 animate-pulse' : ''"
                                                @click="toggleVoiceRecording()"
                                                :disabled="chatTranscribing"
                                                :title="t('voiceHint')"
                                                x-text="chatRecording ? t('voiceRecording') : (chatTranscribing ? t('voiceTranscribing') : t('voiceLabel'))"></button>
                                        </div>
                                    </template>
                                </div>
                                <div class="flex items-center gap-2 shrink-0">
                                    <button class="chat-composer-submit btn btn-accent-cyan"
                                        @click="sendChatMessage()" :disabled="chatSendDisabled()">
                                        <span x-text="chatLoading ? t('sending') : t('send')"></span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="chat-history-panel overflow-hidden shrink-0 h-full min-h-0 transition-all duration-300 ease-out"
                        :class="chatHistoryOpen ? 'w-[320px] opacity-100 translate-x-0' : 'w-0 opacity-0 translate-x-4 pointer-events-none'">
                        <div class="view-card chat-side-panel w-[320px] h-full min-h-0 flex flex-col overflow-hidden">
                            <div class="chat-side-header flex items-center justify-between gap-3 mb-3 flex-shrink-0">
                                <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('historyPanel')"></h3>
                                <div class="chat-side-summary flex items-center gap-2">
                                    <div class="chat-side-count text-[11px] font-mono text-gray-500"
                                        x-text="unifiedChatHistory().length + ' ' + t('sessions')"></div>
                                    <button class="chat-side-close text-xs text-gray-500 hover:text-white" @click="chatHistoryOpen = false">&times;</button>
                                </div>
                            </div>

                            <div class="chat-side-filter mb-3 flex-shrink-0">
                                <select x-model="chatHistoryChannelFilter"
                                    class="chat-control-input input h-9 w-full bg-space-800 border-space-border text-white font-mono text-[11px]">
                                    <option value="all" x-text="t('chatHistoryFilterAll')"></option>
                                    <template x-for="opt in chatHistoryChannelOptions()" :key="opt.id">
                                        <option :value="opt.id" x-text="opt.label"></option>
                                    </template>
                                </select>
                            </div>

                            <div class="space-y-2 flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1">
                                <template x-if="unifiedChatHistory().length === 0">
                                    <div class="text-[11px] font-mono text-gray-500 text-center py-6" x-text="t('chatHistoryEmpty')"></div>
                                </template>
                                <template x-for="card in unifiedChatHistory()" :key="card.id">
                                    <div class="chat-session-card rounded-xl border px-3 py-2 transition-all cursor-pointer"
                                        :class="[
                                            card.type === 'local' && card.raw.id === activeChatSessionId ? 'chat-session-card-active' : '',
                                            card.type === 'remote' && getActiveChatSession()?.originConversationId === (card.raw.conversationId || card.raw.id) ? 'chat-session-card-active' : '',
                                            card.badgeUnread ? 'chat-session-card-unread' : ''
                                        ]"
                                        @click="openHistoryCard(card)">
                                        <div class="chat-session-head flex items-start justify-between gap-2">
                                            <div class="chat-session-copy min-w-0">
                                                <div class="chat-session-title-row flex items-center gap-2 min-w-0">
                                                    <span class="chat-history-channel-badge px-1.5 py-0.5 rounded-full border text-[10px] font-mono whitespace-nowrap"
                                                        :class="chatHistoryChannelBadgeClass(card.channel)"
                                                        x-text="chatHistoryChannelLabel(card.channel)"></span>
                                                    <div class="chat-session-title text-sm text-white truncate" x-text="card.title"></div>
                                                    <span x-show="card.badgeUnread"
                                                        class="chat-session-badge px-1.5 py-0.5 rounded-full bg-amber-500/20 border border-amber-500/30 text-[10px] font-mono text-amber-300">new</span>
                                                </div>
                                                <div class="chat-session-subtitle text-[11px] font-mono text-gray-500 truncate mt-1" x-text="card.subtitle"></div>
                                            </div>
                                            <button class="chat-session-remove text-xs text-gray-500 hover:text-red-300"
                                                x-show="card.type === 'local'"
                                                @click.stop="removeChatSession(card.raw.id)">&times;</button>
                                        </div>
                                        <div class="chat-session-preview mt-2 text-[11px] text-gray-400 truncate" x-show="card.preview" x-text="card.preview"></div>
                                        <div class="chat-session-time mt-1 text-[10px] text-gray-500 font-mono" x-show="card.updatedAt"
                                            x-text="formatRelativeTime(card.updatedAt)"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
