<div class="workspace-header flex items-center justify-between gap-4 mb-6">
                    <div>
                        <div class="workspace-eyebrow text-xs font-mono uppercase tracking-[0.32em]" x-text="t('credentials')"></div>
                        <div class="flex flex-wrap items-center gap-4 mt-2">
                            <h1 class="text-2xl font-bold text-white tracking-tight" x-text="t('mascotTitle')"></h1>
                            <div class="meta-chip flex items-center h-6 px-3 rounded-full bg-space-800/80 border border-space-border/50 shadow-sm backdrop-blur-sm">
                                <span class="text-[10px] font-mono uppercase tracking-wider" x-text="t('mascotDesktopOnly')"></span>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-surface" @click="loadMascotCharacters()" x-text="t('mascotRefresh')"></button>
                </div>

                <div class="view-card overview-card overview-card-accent-green mb-6">
                    <div class="min-w-0">
                        <div class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('mascotKicker')"></div>
                        <h2 class="overview-title text-xl font-semibold text-white mt-2" x-text="t('mascotOverviewTitle')"></h2>
                        <p class="overview-copy text-sm text-gray-400 mt-3" x-text="t('mascotOverviewDesc')"></p>
                    </div>
                </div>

                <!-- Character grid -->
                <div class="view-card mb-6">
                    <div class="flex items-center gap-2.5 mb-4">
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('mascotCharacters')"></h3>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                        <template x-for="c in mascotChars" :key="'mascot-' + c.id">
                            <div class="rounded-xl border p-4 flex flex-col gap-2"
                                :class="c.id === mascotActiveChar ? 'border-neon-green/50 bg-emerald-500/5' : 'border-space-border/25 bg-space-900/35'">
                                <div class="flex items-center justify-between gap-2">
                                    <span class="text-sm font-semibold text-white truncate" x-text="c.name"></span>
                                    <span x-show="c.id === mascotActiveChar" class="text-[10px] font-mono text-neon-green" x-text="t('mascotActive')"></span>
                                </div>
                                <div class="flex flex-wrap gap-1.5">
                                    <span class="inline-flex items-center rounded-full border border-emerald-500/20 bg-emerald-500/10 px-2 py-0.5 text-[10px] font-mono text-emerald-300" x-text="mascotRendererLabel(c.renderer)"></span>
                                    <span class="inline-flex items-center rounded-full border border-space-border/40 bg-white/[0.04] px-2 py-0.5 text-[10px] font-mono text-gray-400" x-text="c.source"></span>
                                </div>
                                <button class="btn btn-xs mt-1"
                                    :class="c.id === mascotActiveChar ? 'btn-surface opacity-50' : 'btn-accent-cyan'"
                                    :disabled="c.id === mascotActiveChar"
                                    @click="setMascotCharacter(c.id)"
                                    x-text="c.id === mascotActiveChar ? t('mascotInUse') : t('mascotUse')"></button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Local import -->
                <div class="view-card mb-6">
                    <div class="flex items-center gap-2.5 mb-3">
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('mascotImportTitle')"></h3>
                    </div>
                    <p class="text-xs text-gray-500 mb-3" x-text="t('mascotImportDesc')"></p>
                    <div class="flex flex-wrap gap-2 items-center">
                        <input type="text" class="input input-sm flex-1 min-w-[260px] bg-space-900/80 border-space-border text-white"
                            x-model="mascotImportPath" :placeholder="t('mascotImportPlaceholder')">
                        <button class="btn btn-sm btn-accent-cyan" :disabled="mascotBusy" @click="importMascotCharacter()" x-text="mascotBusy ? t('saving') : t('mascotImport')"></button>
                    </div>
                    <div class="mt-3 text-[11px] font-mono text-gray-500">
                        <span x-text="t('mascotUserDir')"></span>: <span class="text-gray-400" x-text="mascotUserDir"></span>
                    </div>
                </div>

                <!-- Live2D note -->
                <div class="view-card">
                    <div class="flex items-center gap-2.5 mb-2">
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('mascotLive2dTitle')"></h3>
                    </div>
                    <p class="text-xs text-gray-400 leading-relaxed" x-text="t('mascotLive2dNote')"></p>
                </div>
